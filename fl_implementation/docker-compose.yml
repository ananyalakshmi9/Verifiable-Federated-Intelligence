version: "3"

services:

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"

  client1:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      - DATA_FILE=data/bank_1.csv
    depends_on:
      - server

  client2:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      - DATA_FILE=data/bank_2.csv
    depends_on:
      - server

  client3:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      - DATA_FILE=data/bank_3.csv
    depends_on:
      - server

  client4:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      - DATA_FILE=data/bank_4.csv
    depends_on:
      - server